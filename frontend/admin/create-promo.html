<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Promo - CivicEvents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-gray-50">

  <!-- Navigation Bar -->
  <nav class="navbar bg-white sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="/index.html" class="text-xl font-bold text-gray-800">CivicEvents</a>
        <button id="logoutBtn" class="btn-danger btn-small">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 id="pageTitle" class="text-4xl font-bold text-gray-800 mb-8">Create New Promotion</h1>

    <!-- Form -->
    <div class="bg-white rounded-lg shadow-lg p-8">
      <form id="promoForm" class="space-y-6">
        <!-- Title -->
        <div class="form-group">
          <label for="title" class="block text-sm font-bold text-gray-700 mb-2">Promo Title *</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="e.g., Summer Recreation Programs"
            required
            aria-label="Promo title"
          >
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="description" class="block text-sm font-bold text-gray-700 mb-2">Description *</label>
          <textarea
            id="description"
            name="description"
            placeholder="Describe the promotion..."
            rows="4"
            required
            aria-label="Promo description"
          ></textarea>
        </div>

        <!-- Video Upload -->
        <div class="form-group">
          <label for="video" class="block text-sm font-bold text-gray-700 mb-2">Video File *</label>
          <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 transition cursor-pointer" id="videoDropZone">
            <svg class="w-12 h-12 mx-auto text-gray-400 mb-2" fill="currentColor" viewBox="0 0 20 20">
              <path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"></path>
            </svg>
            <p class="text-gray-600 font-medium">Click or drag video file here</p>
            <p class="text-gray-500 text-sm">MP4, MOV, AVI, MKV (Max 50MB)</p>
            <input
              type="file"
              id="video"
              name="video"
              accept="video/*"
              class="hidden"
              required
              aria-label="Upload video file"
            >
          </div>
          <div id="videoPreviewContainer" class="mt-4 hidden">
            <p class="text-sm text-gray-600">Selected: <span id="videoFileName"></span></p>
            <button type="button" id="removeVideoBtn" class="mt-2 btn-danger btn-small">Remove Video</button>
          </div>
        </div>

        <!-- Caption Text -->
        <div class="form-group">
          <label for="caption_text" class="block text-sm font-bold text-gray-700 mb-2">Caption Text *</label>
          <textarea
            id="caption_text"
            name="caption_text"
            placeholder="Describe the video content or provide captions..."
            rows="3"
            required
            aria-label="Caption text"
          ></textarea>
        </div>

        <!-- Published Toggle -->
        <div class="form-group">
          <label class="flex items-center space-x-3 cursor-pointer">
            <input type="checkbox" id="published" name="published" class="w-5 h-5 rounded">
            <span class="text-gray-700 font-medium">Publish this promotion immediately</span>
          </label>
        </div>

        <!-- Form Actions -->
        <div class="flex gap-4 pt-6 border-t">
          <button type="submit" class="flex-1 btn-primary py-3">
            <span id="submitBtnText">Create Promotion</span>
          </button>
          <button type="button" id="cancelBtn" class="flex-1 btn-secondary py-3">Cancel</button>
        </div>
      </form>
    </div>
  </main>

  <!-- Scripts -->
  <script type="module" src="../../js/app.js"></script>
  <script type="module">
    import { apiCall, logoutUser } from '../js/utils/api.js';
    import { showError, showSuccess } from '../js/utils/ui-helpers.js';

    if (!window.appState?.isAuthenticated || window.appState.user.role !== 'admin') {
      window.location.href = '/login.html';
    }

    let editPromoId = null;
    let selectedVideo = null;

    async function init() {
      setupNavigation();
      setupFileUploads();
      setupFormHandling();

      const urlParams = new URLSearchParams(window.location.search);
      editPromoId = urlParams.get('id');

      if (editPromoId) {
        await loadPromoData(editPromoId);
      }
    }

    function setupNavigation() {
      document.getElementById('logoutBtn').addEventListener('click', () => {
        logoutUser();
        setTimeout(() => window.location.href = '/login.html', 1000);
      });

      document.getElementById('cancelBtn').addEventListener('click', () => {
        window.location.href = '/promos.html';
      });
    }

    function setupFileUploads() {
      // Video Upload
      const videoDropZone = document.getElementById('videoDropZone');
      const videoInput = document.getElementById('video');
      videoDropZone.addEventListener('click', () => videoInput.click());
      videoDropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        videoDropZone.classList.add('border-blue-500', 'bg-blue-50');
      });
      videoDropZone.addEventListener('dragleave', () => {
        videoDropZone.classList.remove('border-blue-500', 'bg-blue-50');
      });
      videoDropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        videoDropZone.classList.remove('border-blue-500', 'bg-blue-50');
        if (e.dataTransfer.files[0]) handleVideoSelect(e.dataTransfer.files[0]);
      });
      videoInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleVideoSelect(e.target.files[0]);
      });
      document.getElementById('removeVideoBtn').addEventListener('click', () => {
        selectedVideo = null;
        videoInput.value = '';
        document.getElementById('videoPreviewContainer').classList.add('hidden');
      });
    }

    function handleVideoSelect(file) {
      // Validate file extension - backend only accepts mp4, mov, avi, mkv
      const validExtensions = ['.mp4', '.mov', '.avi', '.mkv'];
      const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
      if (!validExtensions.includes(ext)) {
        showError('Only MP4, MOV, AVI, or MKV video files are allowed (WebM not supported)');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showError('Video must be smaller than 50MB');
        return;
      }
      selectedVideo = file;
      document.getElementById('videoFileName').textContent = file.name;
      document.getElementById('videoPreviewContainer').classList.remove('hidden');
    }

    async function loadPromoData(promoId) {
      const response = await apiCall(`/promos/${promoId}`);
      if (!response?.data) {
        showError('Failed to load promo');
        return;
      }

      const promo = response.data;
      document.getElementById('pageTitle').textContent = 'Edit Promotion';
      document.getElementById('submitBtnText').textContent = 'Update Promotion';

      document.getElementById('title').value = promo.title;
      document.getElementById('description').value = promo.description;
      document.getElementById('published').checked = promo.published;
    }

    function setupFormHandling() {
      document.getElementById('promoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!editPromoId && !selectedVideo) {
          showError('Please select a video file');
          return;
        }

        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('caption_text', document.getElementById('caption_text').value);
        formData.append('published', document.getElementById('published').checked);

        if (selectedVideo) {
          formData.append('video', selectedVideo);
        }

        const method = editPromoId ? 'PUT' : 'POST';
        const endpoint = editPromoId ? `/promos/${editPromoId}` : '/promos';

        try {
          const response = await apiCall(endpoint, {
            method,
            body: formData,
            headers: {}
          });

          if (response) {
            showSuccess(editPromoId ? 'Promo updated!' : 'Promo created!');
            setTimeout(() => {
              window.location.href = '/promos.html';
            }, 1500);
          }
        } catch (error) {
          console.error('Form submission error:', error);
        }
      });
    }

    init();
  </script>
</body>
</html>
