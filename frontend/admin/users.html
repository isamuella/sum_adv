<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - CivicEvents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-gray-50">

  <!-- Navigation Bar -->
  <nav class="navbar bg-white sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="/index.html" class="text-xl font-bold text-gray-800">CivicEvents Admin</a>
        <div class="flex items-center space-x-4">
          <a href="/admin/dashboard.html" class="nav-link font-medium">Dashboard</a>
          <button id="logoutBtn" class="btn-danger btn-small">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-gray-800 mb-8">User Management</h1>

    <!-- Search & Filter -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <div class="flex gap-4">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by name or email..."
          class="flex-1"
        >
        <button id="filterBtn" class="btn-primary">Filter</button>
        <button id="clearBtn" class="btn-secondary">Clear</button>
      </div>
    </div>

    <!-- Users Table -->
    <div class="card overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-200 bg-gray-50">
            <th class="text-left py-4 px-6 font-bold text-gray-800">Name</th>
            <th class="text-left py-4 px-6 font-bold text-gray-800">Email</th>
            <th class="text-left py-4 px-6 font-bold text-gray-800">Role</th>
            <th class="text-left py-4 px-6 font-bold text-gray-800">Status</th>
            <th class="text-left py-4 px-6 font-bold text-gray-800">Joined</th>
            <th class="text-left py-4 px-6 font-bold text-gray-800">Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="6" class="text-center py-8 text-gray-500">Loading users...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="paginationContainer" class="flex items-center justify-center space-x-2 mt-8"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-gray-300 py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p>&copy; 2026 CivicEvents Admin.</p>
    </div>
  </footer>

  <!-- Scripts -->  <script type="module" src="../js/app.js"></script>  <script type="module">
    import { apiCall, logoutUser } from '../js/utils/api.js';
    import { showError, showSuccess, confirm } from '../js/utils/ui-helpers.js';

    if (!window.appState?.isAuthenticated || window.appState.user.role !== 'admin') {
      window.location.href = '/login.html';
    }

    let allUsers = [];
    let currentPage = 1;
    const pageSize = 10;

    async function init() {
      setupNavigation();
      await loadUsers();
      setupFilters();
    }

    function setupNavigation() {
      document.getElementById('logoutBtn').addEventListener('click', () => {
        logoutUser();
        showSuccess('Logged out');
        setTimeout(() => window.location.href = '/login.html', 1000);
      });
    }

    async function loadUsers() {
      const response = await apiCall('/users');
      if (!response?.data) {
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">Failed to load users</td></tr>';
        return;
      }

      allUsers = response.data;
      displayUsers();
    }

    function displayUsers() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageUsers = allUsers.slice(start, end);

      if (pageUsers.length === 0) {
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">No users found</td></tr>';
        return;
      }

      document.getElementById('usersTableBody').innerHTML = pageUsers.map(user => `
        <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
          <td class="py-4 px-6">${user.full_name}</td>
          <td class="py-4 px-6">${user.email}</td>
          <td class="py-4 px-6">
            <span class="badge ${user.role === 'admin' ? 'badge-primary' : 'badge-success'}">
              ${user.role}
            </span>
          </td>
          <td class="py-4 px-6">
            <button onclick="toggleUserStatus(${user.id}, ${user.is_active})" class="badge ${user.is_active ? 'badge-success' : 'badge-danger'} cursor-pointer hover:opacity-80">
              ${user.is_active ? 'Active' : 'Inactive'}
            </button>
          </td>
          <td class="py-4 px-6 text-sm text-gray-600">${new Date(user.created_at).toLocaleDateString()}</td>
          <td class="py-4 px-6">
            <div class="flex gap-2">
              <button onclick="viewUserDetail(${user.id})" class="btn-secondary btn-small">View</button>
            </div>
          </td>
        </tr>
      `).join('');

      displayPagination();
    }

    function displayPagination() {
      const totalPages = Math.ceil(allUsers.length / pageSize);
      const container = document.getElementById('paginationContainer');
      container.innerHTML = '';

      if (totalPages <= 1) return;

      if (currentPage > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.textContent = '← Previous';
        prevBtn.className = 'btn-secondary';
        prevBtn.onclick = () => {
          currentPage--;
          displayUsers();
          window.scrollTo(0, 0);
        };
        container.appendChild(prevBtn);
      }

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = i === currentPage ? 'btn-primary w-10 h-10' : 'btn-secondary w-10 h-10';
        btn.onclick = () => {
          currentPage = i;
          displayUsers();
          window.scrollTo(0, 0);
        };
        container.appendChild(btn);
      }

      if (currentPage < totalPages) {
        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next →';
        nextBtn.className = 'btn-secondary';
        nextBtn.onclick = () => {
          currentPage++;
          displayUsers();
          window.scrollTo(0, 0);
        };
        container.appendChild(nextBtn);
      }
    }

    function setupFilters() {
      document.getElementById('filterBtn').addEventListener('click', () => {
        const search = document.getElementById('searchInput').value.toLowerCase();
        allUsers = allUsers.filter(user => 
          user.full_name.toLowerCase().includes(search) || 
          user.email.toLowerCase().includes(search)
        );
        currentPage = 1;
        displayUsers();
      });

      document.getElementById('clearBtn').addEventListener('click', async () => {
        document.getElementById('searchInput').value = '';
        await loadUsers();
      });
    }

    window.toggleUserStatus = async (userId, isActive) => {
      const newStatus = !isActive;
      const response = await apiCall(`/users/${userId}`, {
        method: 'PATCH',
        body: JSON.stringify({ is_active: newStatus })
      });

      if (response) {
        showSuccess(`User ${newStatus ? 'activated' : 'deactivated'}`);
        await loadUsers();
      }
    };

    window.viewUserDetail = async (userId) => {
      const response = await apiCall(`/users/${userId}`);
      if (!response?.data) {
        showError('Failed to load user details');
        return;
      }

      const user = response.data;
      alert(`
User Details
─────────────
Name: ${user.full_name}
Email: ${user.email}
Role: ${user.role}
Status: ${user.is_active ? 'Active' : 'Inactive'}
Joined: ${new Date(user.created_at).toLocaleDateString()}

Note: To change user roles, contact the developer.
      `);
    };

    init();
  </script>
</body>
</html>
