<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CivicEvents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="card shadow-xl border-0">
      <!-- Title -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">CivicEvents</h1>
        <p class="text-gray-600 mt-1">Sign in to your account</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-6">
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            aria-label="Email address"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition"
          >
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            aria-label="Password"
            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition"
          >
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full btn-primary py-3 mt-8 text-lg font-semibold">
          Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-3 text-gray-500 text-sm">or</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Signup Link -->
      <div class="text-center">
        <p class="text-gray-600">Don't have an account?
          <a href="signup.html" class="font-semibold text-blue-600 hover:text-blue-700">Sign up</a>
        </p>
      </div>
    </div>

    <!-- Footer Text -->
    <p class="text-center text-gray-600 text-sm mt-6">
      Connecting communities through events and services
    </p>
  </div>

  <!-- Scripts -->
  <script type="module">
    import './js/app.js';
    import { apiCall } from './js/utils/api.js';
    import { showError, showSuccess } from './js/utils/ui-helpers.js';
    import { TOKEN_KEY, USER_KEY } from './js/config.js';

    // Redirect if already logged in
    if (window.appState && window.appState.isAuthenticated) {
      window.location.href = '/index.html';
    }

    const form = document.getElementById('loginForm');
    form.addEventListener('submit', handleLogin);

    async function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password');
        return;
      }

      try {
        const response = await apiCall('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        console.log('Login response:', response);

        if (response && response.token && response.user) {
          // Store token and user
          localStorage.setItem(TOKEN_KEY, response.token);
          localStorage.setItem(USER_KEY, JSON.stringify(response.user));

          // Update global state
          if (!window.appState) {
            window.appState = {};
          }
          window.appState.token = response.token;
          window.appState.user = response.user;
          window.appState.isAuthenticated = true;

          showSuccess('Login successful! Redirecting...');
          console.log('Login successful, user:', response.user);
          
          // Redirect based on role
          setTimeout(() => {
            const redirectUrl = response.user.role === 'admin' ? '/admin/dashboard.html' : '/index.html';
            window.location.href = redirectUrl;
          }, 1500);
        } else {
          console.error('Invalid response from login:', response);
          showError('Login failed - please check your credentials');
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Login failed - ' + (error.message || 'unknown error'));
      }
    }
  </script>
</body>
</html>
